<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>响应式</title>
	<style>

	.circle{
		background-color: red;
		width: 260px;
		height: 260px;
		border-radius: 50%;
		margin: 50px auto;
		box-shadow: 10px 10px 5px 0px rgba(0,0,0,0.75);
	}
	@media (min-width: 700px)
	{
		.circle{
			background-color: #8fbc8f;}
	}
	</style>
</head>
<body>
	<h1>响应式responsive design</h1>
	<div class="circle"></div>
</body>
</html>
