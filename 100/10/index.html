<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>media和display的应用</title>
	<style>
	.nav-bar{
		background-color: lightseagreen;
		width: 100px;
		height: 50px;
		float: right;
		display: none;
	}
	.humburger-btn{
		background-color: deeppink;
		width: 100px;
		height: 100px;
		border-radius: 30%;
	}
	@media (min-width: 500px){
		.nav-bar{display: block;}
		.humburger-btn{display: none;}
	</style>
</head>
<body>
    <div class="nav-bar"></div>
	<div class="humburger-btn"></div>
</body>
</html>
