<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>sidebar</title>
	<script src="http://cdn.bootcss.com/jquery/2.1.4/jquery.js"></script>
	<style>
     body {
     	margin: 0;
     }
   	.box {
	      position: fixed;
		  left: 0;
		  bottom: 0;
	      width: 250px;
	      transform:translateX(-250px);
	      top: 0;
	      background-color: lightgreen;
	      transition:all 1s .3s
		}
	.box.move{
  transform:translateX(0);
}
    .btn{
    	background-color: gold;
    	height: 50px;
    	width: 50px;
    	border-radius: 50%;
    	position: absolute;
    	top: 10px;
    	left: 10px;
    }
	</style>
</head>
<body>
	<div class="box"></div>
	<div class="btn"></div>
	<script>
	$('.btn').click(function(){
		console.log("click!!!!!!!");
		$('.box').toggleClass('move');
})
	</script>
</body>
</html>
