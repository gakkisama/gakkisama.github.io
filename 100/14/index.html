<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>sidebar</title>
	<script src="http://cdn.bootcss.com/jquery/2.1.4/jquery.js"></script>
	<style>
     body {
     	margin: 0;
     }
   	.box {
	      position: fixed;
		  left: 0;
		  bottom: 0;
	      width: 250px;
	      top: 0;
	      background-color: lightgreen;
	      transition:all 1s .1s
		}
	.box.move{
  transform:translateX(-220px);
}
	</style>
</head>
<body>
	<div class="box"></div>
	<script>
	$('.box').click(function(){
		console.log("click!!!!!!!");
		$(this).toggleClass('move');
})
	</script>
</body>
</html>
