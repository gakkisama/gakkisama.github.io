<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<style>
	@import url(http://fonts.googleapis.com/css?family=Roboto+Slab:400,300);
@import url(http://fonts.googleapis.com/css?family=Roboto:400,900);

/* apply a natural box layout model to all elements */

*,
*:before,
*:after {
  -moz-box-sizing: border-box;
  -webkit-box-sizing: border-box;
  box-sizing: border-box;
}

::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: #D24000;
}

::-webkit-scrollbar-thumb {
  background: #D24000;
}

::-webkit-scrollbar-thumb:hover {
  background: #fff;
}


/* CLEARFIX */

.block:after,
.row:after,
header:after,
footer:after,
.cf:after {
  content: "";
  display: table;
  clear: both;
}

header,
footer,
.block {
  width: 95%;
  max-width: 75em;
  /*Set Your Max-width for Desktop*/
  margin: 0 auto;
}

body {
  font-family: 'Roboto Slab', serif;
  font-weight: 300;
  background: #D24000;
  color: #fff;
}

img {
  max-width: 100%;
  height: auto;
  vertical-align: bottom;
  background-color: #D24000;
}

a {
  color: white;
}

#hero {
  background: #D24000;
  color: #fff;
  position: relative;
  min-height: 800px
}

#mast {
  text-align: center;
  position: absolute;
  top: 50%;
  left: 50%;
  -webkit-transform: translate(-50%, -50%);
  transform: translate(-50%, -50%);
  width: 75%;
}

.arrow {
  display: block;
  position: absolute;
  bottom: 10%;
  left: 0;
  right: 0;
  height: 45px;
  width: 45px;
  margin: 0 auto;
  font-size: 4em;
}

#mast>h2 {
  font-weight: 300;
}

#navigation {
  background: #D24000;
}

.logo {
  float: left;
  padding: 1em 0;
}

nav[role=navigation] {
  width: 70%;
  float: right;
}

nav[role=navigation] ul {
  margin: 0;
  padding: 1em 0;
  text-align: right;
}

nav[role=navigation] li {
  display: inline-block;
  margin: 0.25em 0.75em;
}

nav[role=navigation] li a {
  color: #f9f9f9;
  text-decoration: none;
}

.sectionHeader {
  display: block;
  margin: 1em auto;
  font-size: 3em;
  font-family: 'Roboto', serif;
  font-weight: 900;
  text-align: center;
  text-transform: lowercase;
}

#fullGrid {
  width: 100%;
  overflow: hidden;
  background-color: #D24000;
  color: #fff;
}

.fullGridItem {
  display: inline-block;
  width: 25%;
  margin: 0 !important;
}

#footer {
  text-align: center;
  color: fff;
  padding-top: 1em;
  background-color: #D24000;
}

#footer a {
  color: #fff;
  text-decoration: none;
}

@media only screen and (min-width: 768px) and (max-width: 1023px) {
  .fullGridItem {
    width: 33.33%;
  }
}

@media only screen and (min-width: 321px) and (max-width: 767px) {
  .fullGridItem {
    width: 50%;
  }
}

@media only screen and (max-width: 320px) {
  .fullGridItem {
    width: 100%;
  }
}
	</style>
</head>
<body>
	<body>
  <section id="hero">
    <div id="mast">
      <h1><img src="https://s-media-cache-ak0.pinimg.com/originals/8b/75/41/8b7541daeee2c5345c2eca2a989ceaa7.gif" alt="bus" /></h1>
      <h2>Let's Travel</h2>
    </div>
    <div class="arrow"><a data-scroll data-speed="750" data-easing="easeInOutCubic" data-url="false" href="#navigation"><i class="fa fa-angle-down"></i></a></div>
  </section>

  <section id="navigation">
    <div class="block">

      <nav role='navigation'>
        <ul>
          <li><a href="http://gakkisama.github.io/100">百页斩</a></li>
          <li><a href="http://weibo.com/201271819">新垣杰瑞</a></li>
          <li><a href="http://codepen.io">codepen</a></li>

        </ul>
      </nav>
    </div>
  </section>

  <section id="fullGrid">
    <h2 class="sectionHeader">-</h2>

  </section>

  <section id="footer">
    <p>Made by <a href="">Jeremy</a>. <i class="fa fa-facebook"></i> <i class="fa fa-twitter"></i></p>
  </section>
</body>
</body>
</html>
